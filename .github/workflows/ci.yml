name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install GCC 16
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc expect

    - name: Compile and Check
      run: make check
